name: FS Support Nightly

on:
  schedule:
    - cron: "0 2 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run-fs-support-build:
    uses: ./.github/workflows/flutter-build.yml
    secrets: inherit
    with:
      upload-artifact: true
      upload-tag: "fs-nightly"

  normalize-fs-support-release:
    name: Normalize FS Support release assets
    needs: run-fs-support-build
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}
      RELEASE_TAG: fs-nightly
    steps:
      - name: Checkout source with submodules
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Normalize release assets
        shell: bash
        run: |
          set -euo pipefail
          VERSION="$(awk -F '"' '/^version = / { print $2; exit }' Cargo.toml)"
          WORK_DIR="$(mktemp -d)"
          RAW_DIR="$WORK_DIR/raw"
          OUT_DIR="$WORK_DIR/out"
          mkdir -p "$RAW_DIR" "$OUT_DIR"

          gh release download "$RELEASE_TAG" --repo "$GITHUB_REPOSITORY" --dir "$RAW_DIR" --clobber || true

          copy_first() {
            local destination="$1"
            shift
            local match=""
            for pattern in "$@"; do
              match="$(find "$RAW_DIR" -maxdepth 1 -type f -iname "$pattern" | sort | head -n 1)"
              if [[ -n "$match" ]]; then
                cp "$match" "$OUT_DIR/$destination"
                return 0
              fi
            done
            echo "Asset not found for $destination" >&2
            return 0
          }

          copy_first "fs-support-${VERSION}-windows-x86_64.exe" "rustdesk-*x86_64.exe" "*windows*x86_64*.exe"
          copy_first "fs-support-${VERSION}-windows-x86_64.msi" "rustdesk-*x86_64.msi" "*windows*x86_64*.msi"
          copy_first "fs-support-${VERSION}-macos-x86_64.dmg" "rustdesk-*x86_64*.dmg" "*macos*x86_64*.dmg" "*intel*.dmg"
          copy_first "fs-support-${VERSION}-macos-aarch64.dmg" "rustdesk-*aarch64*.dmg" "*macos*aarch64*.dmg" "*apple*.dmg" "*arm64*.dmg"
          copy_first "fs-support-${VERSION}-linux-x86_64.deb" "rustdesk-*x86_64.deb" "*linux*x86_64*.deb"
          copy_first "fs-support-${VERSION}-linux-x86_64.AppImage" "rustdesk-*x86_64.AppImage" "*linux*x86_64*.AppImage"

          tar --exclude-vcs --exclude="$WORK_DIR" -czf "$OUT_DIR/fs-support-${VERSION}-source.tar.gz" .

          RELEASE_ID="$(gh api "repos/$GITHUB_REPOSITORY/releases/tags/$RELEASE_TAG" --jq '.id')"
          gh api "repos/$GITHUB_REPOSITORY/releases/$RELEASE_ID/assets" --paginate --jq '.[] | select(.name | test("^(rustdesk-|fs-support-)")) | .id' | while read -r asset_id; do
            [[ -n "$asset_id" ]] && gh api --method DELETE "repos/$GITHUB_REPOSITORY/releases/assets/$asset_id"
          done

          if find "$OUT_DIR" -maxdepth 1 -type f | grep -q .; then
            gh release upload "$RELEASE_TAG" "$OUT_DIR"/* --repo "$GITHUB_REPOSITORY" --clobber
          else
            echo "No normalized asset generated." >&2
            exit 1
          fi
